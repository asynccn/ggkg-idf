<!doctype html>
<html lang="en-US">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>GGKG</title>
<style>
:root{color-scheme:light dark;--bg:#f6f7fb;--fg:#1a1d24;--muted:#7b8191;--d1:#26a69a;--d2:#1e8c83;--dg:rgba(38,166,154,.45);--po:rgba(0,0,0,.12);--a1:#ff3034;--a2:#f21c21;--ag:rgba(255,48,52,.55);--x1:#8d8d8d;--x2:#757575;--camh:45vh;--menu-head-bg:rgba(0,0,0,.14);--menu-body-bg:rgba(255,255,255,.32);--g-scale:1;--g-lower-offset:calc(2.8rem * var(--g-scale));--g-control-size:calc(2.2rem * var(--g-scale))}
@media (prefers-color-scheme:dark){:root{--bg:#13161d;--fg:#edf1ff;--muted:#a8afc3;--d1:#2db9ac;--d2:#1f988d;--dg:rgba(45,185,172,.38);--po:rgba(0,0,0,.25);--a1:#ff4e54;--a2:#f22c31;--ag:rgba(255,78,84,.52);--x1:#666a74;--x2:#565a63;--menu-head-bg:rgba(0,0,0,.32);--menu-body-bg:rgba(255,255,255,.06)}}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:Arial,Helvetica,sans-serif}body{min-height:100vh}
.left{position:relative;padding:.6rem .7rem .7rem;background:var(--bg)}
.cam-wrap{position:relative;width:100%;max-width:100%;margin:0 auto;background:#000;display:flex;justify-content:center;align-items:flex-start;overflow:hidden}.cam-wrap.no-signal{aspect-ratio:4/3;width:min(100%,640px)}.no-signal-tip{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:rgba(255,255,255,.78);font-size:1.05rem;pointer-events:none}.cam-wrap.no-signal .no-signal-tip{display:flex}.cam-wrap.no-signal #stream{opacity:0}
#stream{display:block;width:min(100%,var(--stream-preview-max-width,100%));max-width:100%;height:auto;max-height:var(--camh);object-fit:contain;background:#000;margin:0 auto}
#save-still{position:absolute;right:.5rem;top:.5rem;text-decoration:none;font-size:.88rem;padding:.5rem .7rem;border-radius:999px;color:#fff;opacity:.78;background:linear-gradient(180deg,#4f72ff,#3553d8);transition:.18s}
#save-still:hover{opacity:.92;box-shadow:0 0 .8rem rgba(79,114,255,.4)}#save-still:active{transform:translateY(1px)}
.controls{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.55rem;margin-top:.65rem}.desktop-only{display:none}
button{border:1px solid rgba(127,127,127,.38);border-radius:.6rem;height:2.2rem;color:#fff;background:linear-gradient(180deg,var(--d1),var(--d2));cursor:pointer;transition:.18s}
button:hover{box-shadow:0 0 1rem var(--dg);filter:saturate(1.06) brightness(1.03)}
button:active{transform:translateY(1px);box-shadow:0 0 .4rem var(--dg),inset 0 0 0 100vmax var(--po)}
button[disabled],button.disabled{background:linear-gradient(180deg,var(--x1),var(--x2));color:#e9e9e9;cursor:not-allowed;box-shadow:none;filter:none;transform:none}
#toggle-stream.stream-active{background:linear-gradient(180deg,var(--a1),var(--a2))}
#toggle-stream.stream-active:hover{box-shadow:0 0 1rem var(--ag);filter:saturate(1.08) brightness(1.04)}
.menu{padding:.6rem .9rem 2rem}
.menu-group{margin:0}
.menu-group+.menu-group{margin-top:.7rem}
.menu-group-head{position:relative;display:flex;align-items:center;min-height:2.15rem;padding:.35rem .55rem .35rem 2.35rem;background:var(--menu-head-bg)}
.menu-group-title{font-size:.95rem;font-weight:600;color:var(--fg)}
.menu-group-toggle{position:absolute;left:0;top:0;width:2.2rem;height:100%;padding:0;border:0;border-radius:0;background:transparent;box-shadow:none;filter:none;transform:none;display:flex;align-items:center;justify-content:center;cursor:pointer}
.menu-group-toggle:hover{background:transparent;box-shadow:none;filter:none}
.menu-group-toggle:active{background:transparent;box-shadow:none;filter:none;transform:none}
.menu-group-toggle svg{width:.95rem;height:.95rem;display:block;transform-origin:50% 50%;transform:rotate(var(--arrow-rotate,180deg)) scale(var(--arrow-scale,.88));transition:transform .18s ease}
.menu-group-toggle use{fill:#5f6878}
.menu-group.collapsed .menu-group-toggle{--arrow-rotate:90deg}
.menu-group:not(.collapsed) .menu-group-toggle{--arrow-rotate:180deg}
.menu-group-body{padding:.45rem .55rem .55rem;background:var(--menu-body-bg)}
#gimbal-menu-group>.menu-group-body{padding-top:2rem}
.menu-group.collapsed .menu-group-body{display:none}
.menu-item{display:flex;align-items:center;justify-content:space-between;gap:.7rem;min-height:2rem;padding:.2rem 0}
.menu-item-label{color:var(--muted);font-size:.9rem}
.menu-item-control{display:flex;align-items:center;justify-content:flex-end;min-width:0;flex:1;gap:.35rem;flex-wrap:wrap}
.menu-item-control select,.menu-item-control input[type='text']{border-radius:.45rem;border:1px solid rgba(127,127,127,.4);background:transparent;color:inherit;padding:.2rem .42rem;height:2rem;min-width:7.2rem;max-width:100%}
.menu-item-control input[type='range']{width:min(16rem,52vw);max-width:100%}
.menu-item-control input[type='checkbox']{width:1.1rem;height:1.1rem}
.menu-inline-btn{height:2rem;padding:0 .55rem;border-radius:.5rem}
.menu-range{color:var(--muted);font-size:.82rem;white-space:nowrap}
.is-hidden{display:none !important}
.about-brand{display:flex;align-items:stretch;justify-content:center;gap:.7rem;min-height:64px;width:fit-content;max-width:100%;margin:1rem auto 1.1rem}
.about-icon{width:64px;height:64px;max-width:64px;max-height:64px;display:block;object-fit:contain;flex:0 0 64px}
.about-name-wrap{display:flex;flex-direction:column;justify-content:flex-start;height:64px}
.about-name{height:32px;line-height:32px;font-size:1.12rem;font-weight:700}
.about-full{height:32px;line-height:32px;font-size:1rem;color:var(--muted)}
.about-detail{margin:.6rem 0 0;line-height:1.5}
.menu-group .gimbal-item{margin:0}
.menu-group .gimbal-head{display:none}
.status.has-gimbal .menu-group{width:100%;background:transparent}
.status.has-gimbal .menu-group-body{padding:0;background:transparent}
.status.has-gimbal .menu-group-head{display:none}
.status.has-gimbal .menu-group .gimbal-head{display:none}
.status{display:none}
.status.has-gimbal{min-height:250px;align-items:stretch}
.status.has-gimbal #gimbal-status-slot{width:100%}
.status.has-gimbal #status-placeholder{display:none !important}
.gimbal-item{margin:0 0 .9rem}.gimbal-head{font-size:.95rem;color:var(--muted);margin:.1rem 0 .35rem}
.gimbal{position:relative;min-height:calc((190px + 78px) * var(--g-scale))}
.gimbal-item.hide-aux .gimbal{min-height:calc(190px * var(--g-scale))}
.gimbal-item.hide-values .g-values{display:none}
.gimbal-item.hide-aux .yaw-wrap,.gimbal-item.hide-aux .pitch-wrap,.gimbal-item.hide-aux .g-reset{display:none}
.g-core{position:absolute;left:50%;top:0;transform:translateX(-50%);width:calc(190px * var(--g-scale));height:calc(190px * var(--g-scale));display:block}
.pad{position:absolute;left:0;top:0;width:calc(190px * var(--g-scale));height:calc(190px * var(--g-scale));border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.08),rgba(0,0,0,.14));box-shadow:inset 0 0 0 1px rgba(127,127,127,.26);overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.pad.press-up::before,.pad.press-right::before,.pad.press-down::before,.pad.press-left::before{background:linear-gradient(45deg,transparent calc(50% - 1px),rgba(127,127,127,.26) calc(50% - 1px) calc(50% + 1px),transparent calc(50% + 1px)),linear-gradient(-45deg,transparent calc(50% - 1px),rgba(127,127,127,.26) calc(50% - 1px) calc(50% + 1px),transparent calc(50% + 1px)),var(--pad-press)}
.pad.press-up{--pad-press:conic-gradient(from -45deg,rgba(0,0,0,.28) 0 25%,transparent 0 100%)}
.pad.press-right{--pad-press:conic-gradient(from 45deg,rgba(0,0,0,.28) 0 25%,transparent 0 100%)}
.pad.press-down{--pad-press:conic-gradient(from 135deg,rgba(0,0,0,.28) 0 25%,transparent 0 100%)}
.pad.press-left{--pad-press:conic-gradient(from 225deg,rgba(0,0,0,.28) 0 25%,transparent 0 100%)}
.pad::before{content:"";position:absolute;inset:0;background:linear-gradient(45deg,transparent calc(50% - 1px),rgba(127,127,127,.26) calc(50% - 1px) calc(50% + 1px),transparent calc(50% + 1px)),linear-gradient(-45deg,transparent calc(50% - 1px),rgba(127,127,127,.26) calc(50% - 1px) calc(50% + 1px),transparent calc(50% + 1px));-webkit-mask:radial-gradient(circle,transparent 0 30%,#000 30% 100%);mask:radial-gradient(circle,transparent 0 30%,#000 30% 100%);pointer-events:none;z-index:4}
.pad.dragging::before{background:none}
.pad.dragging .pad-arrows{display:none}
.pad-handle{position:absolute;left:50%;top:50%;width:calc(82px * var(--g-scale));height:calc(82px * var(--g-scale));transform:translate(-50%,-50%);border-radius:50%;box-sizing:border-box;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.08),rgba(0,0,0,.14));border:1px solid rgba(127,127,127,.26);z-index:6;cursor:grab;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.pad.dragging .pad-handle{cursor:grabbing}
.pad::after{content:none}
.pad button{position:absolute;inset:0;border:0;border-radius:0;padding:0;margin:0;background:transparent;box-shadow:none;transform:none;filter:none;z-index:2;cursor:pointer;pointer-events:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.pad button:hover{box-shadow:none;background:transparent}
.pad button:active{box-shadow:none;transform:none;background:transparent}
.pad .up,.pad .right,.pad .down,.pad .left{background:transparent;clip-path:none;-webkit-mask:none;mask:none}
.pad .up::after,.pad .right::after,.pad .down::after,.pad .left::after{content:none}
.pad-arrows{position:absolute;inset:0;pointer-events:none;z-index:10}
.pad-arrows svg{position:absolute;width:calc(22px * var(--g-scale));height:calc(22px * var(--g-scale));transform:translate(-50%,-50%) rotate(var(--arrow-rotate,0deg)) scale(var(--arrow-scale,1));transform-origin:50% 50%}
.pad-arrows use{fill:#5f6878}
.pad-arrows .a-up{left:50%;top:16%;--arrow-rotate:0deg}
.pad-arrows .a-right{left:84%;top:50%;--arrow-rotate:90deg}
.pad-arrows .a-down{left:50%;top:84%;--arrow-rotate:180deg}
.pad-arrows .a-left{left:16%;top:50%;--arrow-rotate:-90deg}
.yaw-wrap{position:absolute;left:0;bottom:calc(-1 * var(--g-lower-offset));width:calc(190px * var(--g-scale));height:var(--g-control-size);display:flex;align-items:center}
.yaw-wrap input{width:100%;height:100%}
.pitch-wrap{position:absolute;left:calc(100% + .55rem * var(--g-scale));top:0;height:calc(190px * var(--g-scale));display:flex;align-items:center;justify-content:center;overflow:visible}
.pitch-wrap input{writing-mode:vertical-lr;appearance:slider-vertical;-webkit-appearance:slider-vertical;width:calc(2.2rem * var(--g-scale));height:100%}
.g-reset{position:absolute;left:calc(100% + 1.65rem * var(--g-scale));transform:translateX(-50%);bottom:calc(-1 * var(--g-lower-offset));width:var(--g-control-size);height:var(--g-control-size);padding:0;border-radius:999px;border:1px solid rgba(127,127,127,.26);background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.08),rgba(0,0,0,.14));color:#5f6878;display:flex;align-items:center;justify-content:center;font-size:calc(1.05rem * var(--g-scale));line-height:1;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
.g-reset:hover{box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);filter:none}
.g-reset span{display:block}
.g-values{position:absolute;right:0;top:0;transform:none;display:grid;grid-template-columns:1fr;grid-template-rows:auto auto auto auto;gap:.35rem;align-content:space-between;justify-items:stretch;font-size:.88rem;color:var(--muted)}
.g-values label{display:block;margin-top:.2rem}
.g-values input{width:100%;height:2.05rem;border-radius:.45rem;border:1px solid rgba(127,127,127,.45);background:transparent;color:inherit;padding:0 .35rem}
#g-yaw-num,#g-pitch-num{width:8.5ch;min-width:8.5ch;text-align:right}
.g-tip{position:absolute;opacity:0;pointer-events:none;background:rgba(0,0,0,.72);color:#fff;border-radius:.35rem;padding:.18rem .36rem;font-size:.75rem;transform:translateY(-4px);transition:opacity .15s ease}
.yaw-wrap:hover .g-tip,.pitch-wrap:hover .g-tip{opacity:1}
.yaw-wrap .g-tip{left:0;top:-1.35rem}
.pitch-wrap .g-tip{left:50%;top:-1.35rem;transform:translateX(-50%)}
@media (max-width:819px){html,body{height:100vh;overflow:hidden}.app{height:100vh;display:grid;grid-template-rows:auto minmax(0,1fr);overflow:hidden}.left{position:relative;z-index:2;padding:.7rem;background:var(--bg)}.menu{overflow-y:auto;overflow-x:hidden;min-height:0;padding:.3rem .9rem 1rem}.gimbal{column-gap:.45rem}html.stack-scroll,html.stack-scroll body{height:auto;overflow:auto}html.stack-scroll .app{height:auto;display:block;overflow:visible}html.stack-scroll .menu{overflow:visible;min-height:auto;max-height:none}}
@media (max-width:420px){.gimbal{column-gap:.35rem}}
@media (min-width:820px){html,body{height:100vh;overflow:hidden}.app{display:grid;grid-template-columns:minmax(360px,42vw) 1fr;height:calc(100vh - 3.2rem)}.left{height:calc(100vh - 3.2rem);display:flex;flex-direction:column;overflow:hidden}.cam-region{display:flex;flex-direction:column}.cam-wrap{margin:0;width:100%;display:flex;justify-content:center;align-items:flex-start}.cam-wrap.no-signal{display:block;width:min(100%,640px)}#stream{width:min(100%,var(--stream-preview-max-width,100%));height:auto;max-width:100%;max-height:calc(100vh - 15rem)}.controls{grid-template-columns:repeat(4,minmax(0,1fr))}.desktop-only{display:inline-block}.menu{overflow:auto;height:calc(100vh - 3.2rem)}.status{display:flex;margin-top:.65rem;color:var(--muted);min-height:6rem;align-items:flex-start;justify-content:flex-start;text-align:left}}
</style>
</head>
<body>
<main class="app">
<section class="left" id="left-pane">
<div class="cam-region" id="camera-region">
<figure class="cam-wrap no-signal" id="stream-container">
<img id="stream" src="" alt="Camera stream" />
<div class="no-signal-tip" data-i18n="noSignal">No signal</div>
<a id="save-still" href="#" download="capture.jpg" data-i18n="save">Save</a>
</figure>
<section class="controls" id="controls">
<button id="get-still" data-i18n="capture">Capture</button>
<button id="toggle-stream" data-i18n="startStream">Start Stream</button>
<button id="face_enroll" class="desktop-only disabled" disabled data-i18n="enrollFace">Enroll Face</button>
<button id="reset-camera" class="desktop-only" data-i18n="reset">Reset</button>
</section>
</div>
<div class="status" id="status-box"><div id="gimbal-status-slot"></div><div class="status-placeholder" id="status-placeholder">Status info</div></div>
</section>
<aside class="menu">
<section class="menu-group" id="gimbal-menu-group">
  <div class="menu-group-head">
    <div class="menu-group-title" data-i18n="gimbal">Gimbal</div>
    <button id="gimbal-menu-toggle" class="menu-group-toggle" type="button" aria-expanded="true" title="Collapse" aria-label="Collapse">
      <svg viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-arrow-up"></use></svg>
    </button>
  </div>
  <div class="menu-group-body" id="gimbal-menu-slot"></div>
</section>
<section class="menu-group" id="imgset-menu-group">
  <div class="menu-group-head">
    <div class="menu-group-title">图像设置</div>
    <button id="imgset-menu-toggle" class="menu-group-toggle" type="button" aria-expanded="false" title="Expand" aria-label="Expand"><svg viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-arrow-up"></use></svg></button>
  </div>
  <div class="menu-group-body">
    <div class="menu-item"><label class="menu-item-label" for="framesize">分辨率</label><div class="menu-item-control"><select id="framesize" data-var="framesize"><option value="24">5MP(2592x1944)</option><option value="23">QSXGA(2560x1920)</option><option value="22">P_FHD(1080x1920)</option><option value="21">WQXGA(2560x1600)</option><option value="20">QHD(2560x1440)</option><option value="19">QXGA(2048x1536)</option><option value="18">P_3MP(864x1536)</option><option value="17">P_HD(720x1280)</option><option value="16">FHD(1920x1080)</option><option value="15">UXGA(1600x1200)</option><option value="14">SXGA(1280x1024)</option><option value="13">HD(1280x720)</option><option value="12">XGA(1024x768)</option><option value="11">SVGA(800x600)</option><option value="10" selected>VGA(640x480)</option><option value="9">HVGA(480x320)</option><option value="8">CIF(400x296)</option><option value="7">320x320</option><option value="6">QVGA(320x240)</option><option value="5">240x240</option><option value="4">HQVGA(240x176)</option><option value="3">QCIF(176x144)</option><option value="2">128x128</option><option value="1">QQVGA(160x120)</option><option value="0">96x96</option></select></div></div>
    <div class="menu-item"><label class="menu-item-label" for="quality">质量</label><div class="menu-item-control"><span class="menu-range">(4 ~ 63)</span><input id="quality" data-var="quality" type="range" min="4" max="63" value="10"/></div></div>
    <div class="menu-item"><label class="menu-item-label" for="brightness">亮度</label><div class="menu-item-control"><span class="menu-range">(-2 ~ 2)</span><input id="brightness" data-var="brightness" type="range" min="-2" max="2" value="0"/></div></div>
    <div class="menu-item"><label class="menu-item-label" for="contrast">对比度</label><div class="menu-item-control"><span class="menu-range">(-2 ~ 2)</span><input id="contrast" data-var="contrast" type="range" min="-2" max="2" value="0"/></div></div>
    <div class="menu-item"><label class="menu-item-label" for="saturation">饱和度</label><div class="menu-item-control"><span class="menu-range">(-2 ~ 2)</span><input id="saturation" data-var="saturation" type="range" min="-2" max="2" value="0"/></div></div>
    <div class="menu-item"><label class="menu-item-label" for="sharpness">锐度</label><div class="menu-item-control"><span class="menu-range">(-2 ~ 2)</span><input id="sharpness" data-var="sharpness" type="range" min="-2" max="2" value="0"/></div></div>
    <div class="menu-item"><label class="menu-item-label" for="special_effect">特效</label><div class="menu-item-control"><select id="special_effect" data-var="special_effect"><option value="0">无</option><option value="1">负片</option><option value="2">灰度</option><option value="3">红色调</option><option value="4">绿色调</option><option value="5">蓝色调</option><option value="6">棕褐色</option></select></div></div>
  </div>
</section>
<section class="menu-group" id="imgadj-menu-group">
  <div class="menu-group-head"><div class="menu-group-title">图像校正</div><button id="imgadj-menu-toggle" class="menu-group-toggle" type="button" aria-expanded="false" title="Expand" aria-label="Expand"><svg viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-arrow-up"></use></svg></button></div>
  <div class="menu-group-body">
    <div class="menu-item"><label class="menu-item-label" for="lenc">镜头校正</label><div class="menu-item-control"><input id="lenc" data-var="lenc" type="checkbox"/></div></div>
    <div class="menu-item"><label class="menu-item-label" for="hmirror">水平镜像</label><div class="menu-item-control"><input id="hmirror" data-var="hmirror" type="checkbox"/></div></div>
    <div class="menu-item"><label class="menu-item-label" for="vflip">垂直翻转</label><div class="menu-item-control"><input id="vflip" data-var="vflip" type="checkbox"/></div></div>
    <div class="menu-item"><label class="menu-item-label" for="dcw">降采样</label><div class="menu-item-control"><input id="dcw" data-var="dcw" type="checkbox"/></div></div>
  </div>
</section>
<section class="menu-group" id="camsensor-menu-group">
  <div class="menu-group-head"><div class="menu-group-title">相机参数</div><button id="camsensor-menu-toggle" class="menu-group-toggle" type="button" aria-expanded="false" title="Expand" aria-label="Expand"><svg viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-arrow-up"></use></svg></button></div>
  <div class="menu-group-body">
    <div class="menu-item"><label class="menu-item-label" for="awb">自动白平衡</label><div class="menu-item-control"><input id="awb" data-var="awb" type="checkbox"/></div></div>
    <div class="menu-item"><label class="menu-item-label" for="awb_gain">白平衡增益</label><div class="menu-item-control"><input id="awb_gain" data-var="awb_gain" type="checkbox"/></div></div>
    <div class="menu-item" id="wb-mode-row"><label class="menu-item-label" for="wb_mode">白平衡模式</label><div class="menu-item-control"><select id="wb_mode" data-var="wb_mode"><option value="0">自动</option><option value="1">晴天</option><option value="2">阴天</option><option value="3">办公室</option><option value="4">家用</option></select></div></div>
    <div class="menu-item"><label class="menu-item-label" for="aec">自动曝光传感器</label><div class="menu-item-control"><input id="aec" data-var="aec" type="checkbox"/></div></div>

const applyLang=(m)=>{const e=m==='auto'?uaLocale():m,d=I18N[e]||I18N['en-US'];document.documentElement.lang=e;document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(d[k])el.textContent=d[k]});if(gimbalMenuToggle){const tip=gimbalMenuCollapsed?d.expand:d.collapse;gimbalMenuToggle.title=tip;gimbalMenuToggle.setAttribute('aria-label',tip);}if(uiMenuToggle){const tip=uiMenuCollapsed?d.expand:d.collapse;uiMenuToggle.title=tip;uiMenuToggle.setAttribute('aria-label',tip);}if(aboutMenuToggle){const tip=aboutMenuCollapsed?d.expand:d.collapse;aboutMenuToggle.title=tip;aboutMenuToggle.setAttribute('aria-label',tip);}['imgset','imgadj','camsensor','adv'].forEach(name=>{const group=document.getElementById(`${name}-menu-group`),toggle=document.getElementById(`${name}-menu-toggle`);if(!group||!toggle)return;const collapsed=group.classList.contains('collapsed');const tip=collapsed?d.expand:d.collapse;toggle.title=tip;toggle.setAttribute('aria-label',tip);});refreshStream()};
const syncMenuGroupArrow=(group,toggle,collapsed)=>{if(!group)return;group.classList.toggle('collapsed',collapsed);if(toggle)toggle.setAttribute('aria-expanded',String(!collapsed));};
const getMenuState=(groupName)=>{if(groupName==='ui')return{group:uiMenuGroup,toggle:uiMenuToggle,flag:uiMenuCollapsed,key:UI_MENU_COLLAPSE_KEY};if(groupName==='about')return{group:aboutMenuGroup,toggle:aboutMenuToggle,flag:aboutMenuCollapsed,key:ABOUT_MENU_COLLAPSE_KEY};return{group:gimbalMenuGroup,toggle:gimbalMenuToggle,flag:gimbalMenuCollapsed,key:GIMBAL_MENU_COLLAPSE_KEY};};
const setMenuCollapsed=(groupName,collapsed,{persist=true}={})=>{if(groupName==='ui')uiMenuCollapsed=!!collapsed;else if(groupName==='about')aboutMenuCollapsed=!!collapsed;else gimbalMenuCollapsed=!!collapsed;const st=getMenuState(groupName),wasCollapsed=!st.toggle||st.toggle.getAttribute('aria-expanded')!=='true';syncMenuGroupArrow(st.group,st.toggle,st.flag);if(persist)localStorage.setItem(st.key,st.flag?'1':'0');if(st.toggle){const d=currentDict();const tip=st.flag?d.expand:d.collapse;st.toggle.title=tip;st.toggle.setAttribute('aria-label',tip);}if(!st.flag&&wasCollapsed)refreshMenuGroupState(groupName);if(groupName!=='ui'&&groupName!=='about')updateGimbalScale();};
const setNoSignal=(show)=>{if(show)streamContainer.classList.add('no-signal');else streamContainer.classList.remove('no-signal')};
const stopStream=()=>{clearStreamWatchdog();clearCapturePendingTimer();if(streamActive||view.src){view.src=''}streamActive=false;streamHasFrame=false;streamStartRetries=0;isStreamStarting=false;frameWidth=0;frameHeight=0;document.documentElement.style.setProperty('--stream-preview-max-width','100%');refreshStream();updateControlLocks();setNoSignal(true)};
const startStream=()=>{clearCapturePendingTimer();setNoSignal(true);streamHasFrame=false;streamStartRetries=0;isStreamStarting=true;isCapturePending=false;currentImageMode='stream';updateControlLocks();setImageSource(CAM_STREAM_PATH,{cacheBust:false});streamActive=true;refreshStream();armStreamWatchdog()};
const clamp=(v)=>Math.max(-90,Math.min(90,Number(v)||0));
const fmtAngle=(v)=>Number(clamp(v).toFixed(1));
const syncGimbal=(yaw,pitch)=>{const y=fmtAngle(yaw),p=fmtAngle(mapPitchServoToUi(pitch));gYaw.value=y;gYawNum.value=y;gPitch.value=p;gPitchNum.value=p};
const servoSet=(yaw,pitch)=>{const servoPitch=mapPitchUiToServo(pitch);return fetch(`${baseHost}/servo?yaw=${encodeURIComponent(fmtAngle(yaw))}&pitch=${encodeURIComponent(fmtAngle(servoPitch))}`).then(r=>r.json()).then(d=>{if(d.yaw&&d.pitch)syncGimbal(d.yaw.angle,d.pitch.angle)}).catch(()=>{});};
const servoHandle=(x,y,limit=300)=>{const sendY=isGimbalVFlipEnabled()?-Number(y):Number(y);return fetch(`${baseHost}/servo/handle?x=${encodeURIComponent(x.toFixed(1))}&y=${encodeURIComponent(sendY.toFixed(1))}&limit_ms=${limit}`).then(r=>r.json()).then(d=>syncGimbal(d.yaw,d.pitch)).catch(()=>{});};
const servoReset=()=>fetch(`${baseHost}/servo/reset`).then(r=>r.json()).then(d=>{if(d.yaw&&d.pitch)syncGimbal(d.yaw.angle,d.pitch.angle);else syncGimbal(0,0)}).catch(()=>syncGimbal(0,0));
const servoRefresh=()=>fetch(`${baseHost}/servo`).then(r=>r.json()).then(d=>{if(d.yaw&&d.pitch)syncGimbal(d.yaw.angle,d.pitch.angle)}).catch(()=>{});
const stepGimbal=(dy,dp)=>{const y=fmtAngle(Number(gYaw.value)+dy),pUi=fmtAngle(Number(gPitch.value)+dp);gYaw.value=y;gYawNum.value=y;gPitch.value=pUi;gPitchNum.value=pUi;servoSet(y,pUi)};
const updateGimbalScale=()=>{const hostW=(gimbalPanel.parentElement?.clientWidth||window.innerWidth);const contentW=Math.max(180,hostW-20);const hideValues=contentW<360;const hideAux=contentW<300;gimbalPanel.classList.toggle('hide-values',hideValues);gimbalPanel.classList.toggle('hide-aux',hideAux);const reserved=hideAux?0:(hideValues?36:118);const effective=Math.max(150,contentW-reserved);const s=Math.max(0.56,Math.min(1,effective/190));document.documentElement.style.setProperty('--g-scale',String(s));};
const clearPadPress=()=>gPad.classList.remove(...padPressClasses);
const setPadPress=(dir)=>{clearPadPress();if(dir)gPad.classList.add('press-'+dir)};
const getPadDirection=(e)=>{const r=gPad.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;const dx=e.clientX-cx,dy=e.clientY-cy;const dist=Math.hypot(dx,dy);const outer=r.width/2,inner=outer*0.43;if(dist<inner||dist>outer)return'';const a=Math.atan2(dy,dx)*180/Math.PI;if(a>=-45&&a<45)return'right';if(a>=45&&a<135)return'down';if(a>=-135&&a<-45)return'up';return'left'};
const stepPadDirection=(dir,send=true)=>{if(dir==='right'){if(send)stepGimbal(3,0);return true;}if(dir==='down'){if(send)stepGimbal(0,isGimbalVFlipEnabled()?-3:3);return true;}if(dir==='up'){if(send)stepGimbal(0,isGimbalVFlipEnabled()?3:-3);return true;}if(dir==='left'){if(send)stepGimbal(-3,0);return true;}return false};
const stopPadHold=()=>{if(padHoldDelayTimer){clearTimeout(padHoldDelayTimer);padHoldDelayTimer=0;}if(padHoldTimer){clearInterval(padHoldTimer);padHoldTimer=0;}if(padLongPressActive)servoHandle(0,0,300);else if(padHoldDir)stepPadDirection(padHoldDir);padHoldDir='';padLongPressActive=false;clearPadPress()};
const handlePadPointerDown=(e)=>{if(gHandleDragging)return;e.preventDefault();const dir=getPadDirection(e);if(!dir)return;try{gPad.setPointerCapture(e.pointerId)}catch(_){ }if(padHoldDelayTimer)clearTimeout(padHoldDelayTimer);if(padHoldTimer)clearInterval(padHoldTimer);padHoldDir=dir;padLongPressActive=false;setPadPress(dir);padHoldDelayTimer=setTimeout(()=>{padHoldDelayTimer=0;padLongPressActive=true;const vx=dir==='right'?18:dir==='left'?-18:0,vy=dir==='down'?18:dir==='up'?-18:0;servoHandle(vx,vy,300);padHoldTimer=setInterval(()=>servoHandle(vx,vy,300),120)},800)};
const resetGimbalHandle=()=>{gHandleDragging=false;gHandleVector={x:0,y:0};gHandle.style.transform='translate(-50%,-50%)';gPad.classList.remove('dragging');servoHandle(0,0,300)};
const updateGimbalHandle=(e)=>{const r=gPad.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;let dx=e.clientX-cx,dy=e.clientY-cy;const outer=r.width/2,handleRadius=gHandle.getBoundingClientRect().width/2,max=Math.max(0,outer-handleRadius);const dist=Math.hypot(dx,dy);if(dist>max&&dist>0){dx=dx/dist*max;dy=dy/dist*max}gHandleVector={x:max?dx/max:0,y:max?dy/max:0};gHandle.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`};
const handleGimbalHandleDown=(e)=>{e.preventDefault();e.stopPropagation();stopPadHold();gHandleDragging=true;gPad.classList.add('dragging');try{gHandle.setPointerCapture(e.pointerId)}catch(_){ }updateGimbalHandle(e)};
const handleGimbalHandleMove=(e)=>{if(!gHandleDragging)return;e.preventDefault();updateGimbalHandle(e);servoHandle(gHandleVector.x*30,gHandleVector.y*30,300)};
const handleGimbalHandleUp=(e)=>{if(!gHandleDragging)return;e.preventDefault();resetGimbalHandle()};
const placeGimbal=()=>{const desktop=window.matchMedia('(min-width: 820px)').matches;const belowSpace=window.innerHeight-cameraRegion.getBoundingClientRect().bottom;const canUseStatus=desktop&&statusBox.clientWidth>=320&&belowSpace>=220;const menuHost=document.querySelector('.menu');if(gimbalPanel.parentNode!==gimbalMenuSlot)gimbalMenuSlot.appendChild(gimbalPanel);if(canUseStatus){if(gimbalMenuGroup.parentNode!==gimbalStatusSlot)gimbalStatusSlot.appendChild(gimbalMenuGroup);statusBox.classList.add('has-gimbal');statusPlaceholder.style.display='none';}else{if(menuHost&&gimbalMenuGroup.parentNode!==menuHost)menuHost.insertBefore(gimbalMenuGroup,menuHost.firstElementChild||null);statusBox.classList.remove('has-gimbal');statusPlaceholder.style.display=desktop?'flex':'none';}const menuNeedsStackScroll=(()=>{if(desktop||canUseStatus||!menuHost)return false;const available=Math.max(0,window.innerHeight-menuHost.getBoundingClientRect().top);const visibleRows=[...menuHost.querySelectorAll('.menu-item')].filter(el=>el.getClientRects().length>0);const sampleRows=visibleRows.slice(0,MIN_MENU_VISIBLE_ROWS);let menuLineHeight=0;if(sampleRows.length){const total=sampleRows.reduce((sum,el)=>sum+el.getBoundingClientRect().height,0);menuLineHeight=total/sampleRows.length;}if(!(menuLineHeight>0)){const head=menuHost.querySelector('.menu-group-head');if(head&&head.getClientRects().length>0)menuLineHeight=head.getBoundingClientRect().height;}if(!(menuLineHeight>0)){menuLineHeight=Math.round(parseFloat(getComputedStyle(menuHost).fontSize||'16')*2.6);}menuLineHeight=Math.max(32,Math.round(menuLineHeight));return available<menuLineHeight*MIN_MENU_VISIBLE_ROWS;})();document.documentElement.classList.toggle('stack-scroll',menuNeedsStackScroll);updateGimbalScale();updatePreviewScale();};
stillButton.onclick=()=>{if(isCapturePending||isStreamSwitching)return;isCapturePending=true;currentImageMode='capture';updateControlLocks();clearCapturePendingTimer();capturePendingTimer=setTimeout(()=>{if(currentImageMode==='capture'){isCapturePending=false;updateControlLocks();}},4000);const doCapture=()=>{setNoSignal(true);setImageSource(CAM_CAPTURE_PATH);};if(streamActive){isStreamSwitching=true;updateControlLocks();stopStream();isStreamSwitching=false;updateControlLocks();setTimeout(doCapture,120)}else{doCapture()}};
streamButton.onclick=()=>{if(isStreamSwitching||isCapturePending)return;isStreamSwitching=true;updateControlLocks();if(streamActive)stopStream();else startStream();isStreamSwitching=false;updateControlLocks()};
resetButton.onclick=()=>{stopStream();setNoSignal(true);fetch(`${baseHost}/restart`).catch(()=>{}).finally(()=>{setTimeout(()=>{window.location.reload()},1800);});};
enrollButton.onclick=()=>{fetch(`${baseHost}${CAM_CONTROL_PATH}?var=face_enroll&val=1`).catch(()=>{})};
saveButton.onclick=async(ev)=>{ev.preventDefault();const metrics=getFrameMetrics();if(!metrics){return;}const c=document.createElement('canvas');c.width=metrics.width;c.height=metrics.height;const ctx=c.getContext('2d');if(!ctx){return;}ctx.drawImage(view,0,0,metrics.width,metrics.height);try{const blob=await new Promise((resolve)=>c.toBlob(resolve,'image/jpeg'));if(!blob)return;if(saveObjectUrl){URL.revokeObjectURL(saveObjectUrl);saveObjectUrl='';}saveObjectUrl=URL.createObjectURL(blob);const d=new Date();const domain=document.location.hostname;const filename=(sysHostname&&sysHostname.length>0) ? `ggkg_${sysHostname}_${domain}_${iso8601Local(d)}.jpg` : `ggkg_${domain}_${iso8601Local(d)}.jpg`;const dl=document.createElement('a');dl.href=saveObjectUrl;dl.download=filename;dl.rel='noopener';document.body.appendChild(dl);dl.click();dl.parentNode.removeChild(dl);setTimeout(()=>{if(saveObjectUrl){URL.revokeObjectURL(saveObjectUrl);saveObjectUrl='';saveButton.href='#';}},800);}catch(e){console.error(e)}};
view.addEventListener('load',()=>{updateFrameMetrics();setNoSignal(false);if(currentImageMode==='capture'){isCapturePending=false;clearCapturePendingTimer();}updateControlLocks();});
view.addEventListener('error',()=>{if(streamActive){streamHasFrame=false;}if(currentImageMode==='capture'){isCapturePending=false;clearCapturePendingTimer();}setNoSignal(true);updateControlLocks()});
gPad.addEventListener('pointerdown',handlePadPointerDown);
gPad.addEventListener('pointerup',stopPadHold);
gPad.addEventListener('pointercancel',stopPadHold);
gPad.addEventListener('lostpointercapture',stopPadHold);
gPad.addEventListener('contextmenu',e=>e.preventDefault());
gHandle.addEventListener('pointerdown',handleGimbalHandleDown);
gHandle.addEventListener('pointermove',handleGimbalHandleMove);
gHandle.addEventListener('pointerup',handleGimbalHandleUp);
gHandle.addEventListener('pointercancel',handleGimbalHandleUp);
gHandle.addEventListener('lostpointercapture',handleGimbalHandleUp);
gHandle.addEventListener('contextmenu',e=>e.preventDefault());
document.getElementById('g-reset').onclick=()=>servoReset();
if(gimbalMenuToggle)gimbalMenuToggle.onclick=()=>setMenuCollapsed('gimbal',!gimbalMenuCollapsed);
if(uiMenuToggle)uiMenuToggle.onclick=()=>setMenuCollapsed('ui',!uiMenuCollapsed);
if(aboutMenuToggle)aboutMenuToggle.onclick=()=>setMenuCollapsed('about',!aboutMenuCollapsed);

gYaw.oninput=()=>{const y=fmtAngle(gYaw.value),pUi=fmtAngle(gPitch.value);gYaw.value=y;gYawNum.value=y;gPitch.value=pUi;gPitchNum.value=pUi;servoSet(y,pUi)};
gPitch.oninput=()=>{const y=fmtAngle(gYaw.value),pUi=fmtAngle(gPitch.value);gYaw.value=y;gYawNum.value=y;gPitch.value=pUi;gPitchNum.value=pUi;servoSet(y,pUi)};
gYawNum.onchange=()=>{const y=fmtAngle(gYawNum.value),pUi=fmtAngle(gPitchNum.value);gYaw.value=y;gYawNum.value=y;gPitch.value=pUi;gPitchNum.value=pUi;servoSet(y,pUi)};
gPitchNum.onchange=()=>{const y=fmtAngle(gYawNum.value),pUi=fmtAngle(gPitchNum.value);gYaw.value=y;gYawNum.value=y;gPitch.value=pUi;gPitchNum.value=pUi;servoSet(y,pUi)};
const st=localStorage.getItem('ggkgThemeMode')||'auto',sl=localStorage.getItem('ggkgLangMode')||'auto';
gimbalMenuCollapsed=false;
uiMenuCollapsed=true;
aboutMenuCollapsed=true;
themeSelect.value=st;langSelect.value=sl;
applyTheme(st);applyLang(sl);
syncGimbal(0,0);
bindMenuControlEvents();
if(vflipInput){vflipInput.addEventListener('change',()=>{const pUi=fmtAngle(-Number(gPitch.value));gPitch.value=pUi;gPitchNum.value=pUi;});}
bindControlTooltips();
initExtraMenuGroups();
refreshMenuGroupState('gimbal');
servoRefresh();
placeGimbal();
fetchSysHostname();

framesize.addEventListener('change',()=>{normalizeFramesizeSelection();});

themeSelect.addEventListener('change',()=>{const v=themeSelect.value;localStorage.setItem('ggkgThemeMode',v);applyTheme(v)});
langSelect.addEventListener('change',()=>{const v=langSelect.value;localStorage.setItem('ggkgLangMode',v);applyLang(v)});
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{if(themeSelect.value==='auto')applyTheme('auto')});
window.addEventListener('resize',()=>{placeGimbal()});
window.addEventListener('orientationchange',()=>{placeGimbal()});
})();
</script>
